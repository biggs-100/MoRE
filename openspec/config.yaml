# openspec/config.yaml
schema: spec-driven

context: |
  Tech stack: Python 3.14+, PyTorch, FAISS-IVF
  Architecture: MoRE-3 (Mixture of Resonant Experts) with Autonomous Mitosis
  Testing: Pytest (py -m pytest)
  Style: PEP8 with strict type hinting (hints of high-impact research)

strict_tdd: true

testing:
  runner:
    command: "py -m pytest"
    framework: "pytest"
  layers:
    unit: true
    integration: true
  coverage:
    available: false

rules:
  proposal:
    - Focus on empirical validation and ablation studies
  specs:
    - Use Given/When/Then for behavior validation
  design:
    - Document mitosis triggers and novelty gate logic
  tasks:
    - Group by Phase (Infrastructure, Baseline, Evaluation)
  apply:
    - Strict TDD (Red-Green-Refactor)
  verify:
    - Matplotlib results must be saved as artifacts
  archive:
    - Close JSON results into a central benchmark report
